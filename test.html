<!DOCTYPE html>
<html>
<head>
<title>AI Product Metadata Generator</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:8px;
width:400px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
background:#2e7d32;
color:white;
padding:10px;
border:none;
width:100%;
cursor:pointer;
}

pre{
background:#eee;
padding:10px;
margin-top:15px;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Tag Generator</h2>

<label>Product Name</label>
<input id="name">

<label>Description</label>
<input id="description">

<label>Material</label>
<input id="material">

<button onclick="generate()">Generate Metadata</button>

<pre id="result"></pre>

</div>

<script>
async function generate(){

const response = await fetch("http://127.0.0.1:5000/generate-tags",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
product_name:document.getElementById("name").value,
description:document.getElementById("description").value,
material:document.getElementById("material").value
})
});

const data = await response.json();

document.getElementById("result").textContent =
JSON.stringify(data,null,2);
}
</script>

</body>
</html>
